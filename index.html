<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var DJ=["日","月","火","水","木","金","土"];

var MEMBERS=[
  {id:"hamabe",name:"浜辺",pin:"1111",
   workDays:[0,3,4,5,6],type:"salary",
   fork:true,combo:true},
  {id:"kambara",name:"神原",pin:"2222",
   workDays:[0,1,2,6],type:"part",
   fork:true,combo:false},
  {id:"yamamoto",name:"山本",pin:"3333",
   workDays:[1,2,4,5],type:"part",
   fork:true,combo:true},
  {id:"tomioka",name:"富岡",pin:"4444",
   workDays:[2,4,5],type:"salary",
   fork:false,combo:false},
  {id:"gushiken",name:"具志堅",pin:"5555",
   workDays:[],type:"ignite"},
  {id:"handa",name:"半田",pin:"6666",
   workDays:[],type:"ignite"}
];
var WORKERS=MEMBERS.filter(function(m){
  return m.type!=="ignite";
});
var IGNITERS=[
  {id:"hamabe",gDays:[],mDays:[]},
  {id:"gushiken",gDays:[1,3],mDays:[]},
  {id:"handa",gDays:[],mDays:[2]},
  {id:"tomioka",gDays:[4,5],mDays:[5]},
  {id:"kambara",gDays:[6,0],mDays:[1,6,0]}
];
var G_DAYS=[0,1,3,4,5,6];
var M_DAYS=[0,1,2,5,6];
var ACTIONS=[
  {id:"checkin",label:"出 勤",
   icon:"\u{1F3ED}",color:"#2E7D32"},
  {id:"checkout",label:"退 勤",
   icon:"\u{1F3E0}",color:"#C62828"},
  {id:"ignite_golden",label:"着火（黄金泉）",
   icon:"\u{1F525}",color:"#E65100"},
  {id:"ignite_motoyu",label:"着火（元 湯）",
   icon:"\u{1F525}",color:"#4E342E"},
  {id:"inject",label:"投 入",
   icon:"\u{1FAB5}",color:"#1565C0"}
];

function pad(n){return n<10?"0"+n:""+n}
function fmtTime(d){
  return pad(d.getHours())+":"
    +pad(d.getMinutes())+":"
    +pad(d.getSeconds());
}
function fmtDate(d){
  return d.getFullYear()+"/"
    +pad(d.getMonth()+1)+"/"+pad(d.getDate());
}
function todayKey(){
  var d=new Date();
  return d.getFullYear()+"-"
    +pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function dim(y,m){return new Date(y,m,0).getDate();}
function doW(y,m,d){return new Date(y,m-1,d).getDay();}
function mkKey(y,m){return y+"-"+pad(m);}
function nextMonth(){
  var d=new Date();
  var y=d.getFullYear();var m=d.getMonth()+2;
  if(m>12){m-=12;y++;}
  return{year:y,month:m};
}
function getNth(y,m,wd,n){
  var c=0;
  for(var d=1;d<=dim(y,m);d++){
    if(doW(y,m,d)===wd){c++;if(c===n)return d;}
  }
  return -1;
}
function findMember(id){
  for(var i=0;i<MEMBERS.length;i++){
    if(MEMBERS[i].id===id)return MEMBERS[i];
  }
  return{id:id,name:id,workDays:[]};
}

// シフト自動生成ロジック
function generateShift(y,m,offByMember){
  var nd=dim(y,m);var days=[];
  var s2=getNth(y,m,2,2);
  // 1. 出勤者決定
  for(var d=1;d<=nd;d++){
    var w=doW(y,m,d);var att=[];
    for(var i=0;i<WORKERS.length;i++){
      var mb=WORKERS[i];
      var sched=mb.workDays.indexOf(w)>=0;
      if(mb.id==="hamabe"&&!sched&&d===s2)sched=true;
      var off=offByMember[mb.id]||[];
      if(sched&&off.indexOf(d)<0)att.push(mb.id);
    }
    days.push({day:d,dow:w,att:att,forced:[]});
  }
  // 2. フォーク制約
  for(var d2=0;d2<days.length;d2++){
    var dd=days[d2];var hF=false;
    for(var fi=0;fi<dd.att.length;fi++){
      var wm=findMember(dd.att[fi]);
      if(wm.fork)hF=true;
    }
    if(!hF){
      var fH=WORKERS.filter(function(m2){
        return m2.fork&&dd.att.indexOf(m2.id)<0;
      });
      if(fH.length>0){
        dd.att.push(fH[0].id);
        dd.forced.push(fH[0].name+"(フォーク)");
      }
    }
  }
  // 3. コンボ制約(週3)
  var ws=0;
  while(ws<days.length){
    var we=ws;
    for(var k=ws;k<days.length;k++){
      we=k;
      if(k>ws&&days[k].dow===1){we=k-1;break;}
      if(k===days.length-1)break;
    }
    var cD=0;
    for(var cd=ws;cd<=we;cd++){
      for(var ci=0;ci<days[cd].att.length;ci++){
        var cwm=findMember(days[cd].att[ci]);
        if(cwm.combo){cD++;break;}
      }
    }
    var need=3-cD;
    for(var ad=ws;ad<=we&&need>0;ad++){
      var aHC=false;
      for(var aci=0;aci<days[ad].att.length;aci++){
        var acwm=findMember(days[ad].att[aci]);
        if(acwm.combo)aHC=true;
      }
      if(!aHC){
        var cH=WORKERS.filter(function(m3){
          return m3.combo&&days[ad].att.indexOf(m3.id)<0;
        });
        if(cH.length>0){
          days[ad].att.push(cH[0].id);
          days[ad].forced.push(cH[0].name+"(準中型等)");
          need--;
        }
      }
    }
    ws=we+1;
  }
  // 4. 着火割り当て
  for(var d3=0;d3<days.length;d3++){
    var dd3=days[d3];var w3=dd3.dow;
    var nG=G_DAYS.indexOf(w3)>=0;
    var nM=M_DAYS.indexOf(w3)>=0;
    var gi=null,mi=null;
    if(nG){
      for(var ii=0;ii<IGNITERS.length;ii++){
        var ig=IGNITERS[ii];
        if(ig.gDays.indexOf(w3)>=0){gi=ig.id;break;}
      }
      if(!gi&&dd3.att.length>0){
        gi=dd3.att.indexOf("tomioka")>=0
          ?"tomioka":dd3.att[0];
      }
    }
    if(nM){
      for(var jj=0;jj<IGNITERS.length;jj++){
        var ig2=IGNITERS[jj];
        if(ig2.mDays.indexOf(w3)>=0){mi=ig2.id;break;}
      }
      if(!mi&&dd3.att.length>0){
        var fb=dd3.att.filter(function(x){
          return x!==gi;
        });
        mi=fb.length>0?fb[0]:dd3.att[0];
      }
    }
    // 投入: 社員優先
    var salary=dd3.att.filter(function(id){
      var m4=findMember(id);
      return m4.type==="salary";
    });
    var part=dd3.att.filter(function(id){
      var m4=findMember(id);
      return m4.type==="part";
    });
    var injArr=[];
    for(var si=0;si<4;si++){
      if(salary.length>0)injArr.push(salary[si%salary.length]);
      else if(part.length>0)injArr.push(part[si%part.length]);
      else injArr.push(null);
    }
    var hasOT=false;
    if(injArr[3]){
      var w17=findMember(injArr[3]);
      if(w17.type==="part")hasOT=true;
    }
    var lbl="";
    if(gi&&mi)lbl="□元";
    else if(gi)lbl="□";
    else if(mi)lbl="元";
    dd3.gi=gi;dd3.mi=mi;dd3.lbl=lbl;
    dd3.nG=nG;dd3.nM=nM;
    dd3.injArr=injArr;dd3.hasOT=hasOT;
  }
  return days;
}

function App(){

  var _allD=useState([]),allDiary=_allD[0],setAllDiary=_allD[1];
  var _showDiary=useState(false),showDiary=_showDiary[0],setShowDiary=_showDiary[1];
  var _racks=useState("0"),racks=_racks[0],setRacks=_racks[1];
  var _bundles=useState("0"),bundles=_bundles[0],setBundles=_bundles[1];
  var _delivers=useState("0"),delivers=_delivers[0],setDelivers=_delivers[1];

  var _offDays=useState([]),offDays=_offDays[0],setOffDays=_offDays[1];

  useEffect(function(){
    var t=setInterval(function(){setNow(new Date());},1000);
    return function(){clearInterval(t);};
  },[]);

  var nxM=nextMonth();

  function loadMy(uid){
    db.collection("stamps").where("userId","==",uid).where("dateKey","==",todayKey()).orderBy("time","desc")
      .onSnapshot(function(snap){var a=[];snap.forEach(function(doc){a.push(doc.data());});setStamps(a);});
    var mk=mkKey(nxM.year,nxM.month);
    db.collection("offdays").where("userId","==",uid).where("monthKey","==",mk)
      .onSnapshot(function(snap){var a=[];snap.forEach(function(doc){var d=doc.data();if(d.days)a=d.days;});setOffDays(a);});
  }
  function loadAll(){
    db.collection("stamps").where("dateKey","==",todayKey()).orderBy("time","desc")
      .onSnapshot(function(snap){var a=[];snap.forEach(function(doc){a.push(doc.data());});setAllSt(a);});
    db.collection("diary").where("dateKey","==",todayKey())
      .onSnapshot(function(snap){var a=[];snap.forEach(function(doc){a.push(doc.data());});setAllDiary(a);});
    var mk=mkKey(nxM.year,nxM.month);
    db.collection("offdays").where("monthKey","==",mk)
      .onSnapshot(function(snap){var a=[];snap.forEach(function(doc){a.push(doc.data());});setAllOff(a);});
    // 保存済みシフト読み込み
    db.collection("shifts").doc(mk).get().then(function(doc){
      if(doc.exists){setSavedShift(doc.data().days);}
    });
  }
  function getGps(){
    if(navigator.geolocation)navigator.geolocation.getCurrentPosition(
      function(p){setGps({lat:p.coords.latitude,lng:p.coords.longitude});},function(){setGps(null);});
  }
  function login(m){setUser(m);loadMy(m.id);setPage("main");setMsg(null);getGps();}
  function logout(){setUser(null);setStamps([]);setPage("select");setPin("");setSelUser(null);setCnf(null);setShowDiary(false);setShowOff(false);}
  function doStamp(a){
    var t=new Date();
    db.collection("stamps").add({userId:user.id,userName:user.name,action:a.id,label:a.label,icon:a.icon,
      time:t.getTime(),timeStr:fmtTime(t),dateStr:fmtDate(t),dateKey:todayKey(),
      gpsLat:gps?gps.lat:null,gpsLng:gps?gps.lng:null});
    setMsg(a.label+" を記録しました");setCnf(null);
    setTimeout(function(){setMsg(null);},3000);getGps();
  }
  function doCheckoutWithDiary(){
    var t=new Date();
    db.collection("stamps").add({userId:user.id,userName:user.name,action:"checkout",label:"退 勤",icon:"\u{1F3E0}",
      time:t.getTime(),timeStr:fmtTime(t),dateStr:fmtDate(t),dateKey:todayKey(),
      gpsLat:gps?gps.lat:null,gpsLng:gps?gps.lng:null});
    db.collection("diary").add({userId:user.id,userName:user.name,dateKey:todayKey(),dateStr:fmtDate(t),
      racks:parseInt(racks)||0,bundles:parseInt(bundles)||0,delivers:parseInt(delivers)||0,memo:memo,time:t.getTime()});
    setMsg("退勤 + 日誌を記録しました");setShowDiary(false);
    setRacks("0");setBundles("0");setDelivers("0");setMemo("");
    setTimeout(function(){setMsg(null);},3000);getGps();
  }
  function doCheckoutSkip(){
    doStamp({id:"checkout",label:"退 勤",icon:"\u{1F3E0}",color:"#C62828"});setShowDiary(false);
  }
  function toggleOff(day){
    var newDays;
    if(offDays.indexOf(day)>=0)newDays=offDays.filter(function(d){return d!==day;});
    else newDays=offDays.concat([day]);
    setOffDays(newDays);
    var mk=mkKey(nxM.year,nxM.month);
    db.collection("offdays").doc(user.id+"_"+mk).set({
      userId:user.id,userName:user.name,monthKey:mk,days:newDays,updated:new Date().getTime()});
  }
  // シフト生成
  function doGenerateShift(){
    var offByM={};
    WORKERS.forEach(function(m){offByM[m.id]=[];});
    allOff.forEach(function(o){if(offByM[o.userId])offByM[o.userId]=o.days||[];});
    var days=generateShift(nxM.year,nxM.month,offByM);
    setShiftData(days);
    setSavedShift(null);
  }
  // シフト保存
  function saveShift(){
    if(!shiftData)return;
    var mk=mkKey(nxM.year,nxM.month);
    // シリアライズ
    var serialized=shiftData.map(function(d){
      return{day:d.day,dow:d.dow,att:d.att,gi:d.gi,mi:d.mi,lbl:d.lbl,
        injArr:d.injArr,hasOT:d.hasOT,forced:d.forced,nG:d.nG,nM:d.nM};
    });
    db.collection("shifts").doc(mk).set({
      monthKey:mk,year:nxM.year,month:nxM.month,
      days:serialized,updated:new Date().getTime()
    });
    setSavedShift(serialized);
    setMsg("シフトを保存しました");
    setTimeout(function(){setMsg(null);},3000);
  }
  // シフト手動編集
  function toggleShiftAtt(di,mid){
    if(!shiftData)return;
    var nd2=shiftData.map(function(d,i){
      if(i!==di)return d;
      var na=d.att.slice();var idx=na.indexOf(mid);
      if(idx>=0)na.splice(idx,1);else na.push(mid);
      return Object.assign({},d,{att:na});
    });
    setShiftData(nd2);setSavedShift(null);
  }

          })}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,maxWidth:280,margin:"0 auto"}}>
          {[1,2,3,4,5,6,7,8,9,"",0,"\u232B"].map(function(n,idx){
            if(n==="")return <div key={idx}></div>;
            return(<button key={idx} onClick={function(){
              if(n==="\u232B")setPin(pin.slice(0,-1));
              else if(pin.length<4){var np=pin+n;setPin(np);if(np.length===4)onComplete(np);}
            }} style={{width:"100%",padding:"16px 0",borderRadius:12,border:"none",

      </div>

  // === ユーザー選択 ===
  if(page==="select"){
    return(<div style={greenBg}>
      <div style={{fontSize:13,color:"#A5D6A7",letterSpacing:3,marginBottom:8}}>MAKIBA FACTORY</div>

      <div style={{width:"100%",maxWidth:400}}>

        {MEMBERS.map(function(m){
          return(<button key={m.id} onClick={function(){setSelUser(m);setPin("");setPage("pin");}}
            style={{width:"100%",padding:"20px 24px",marginBottom:10,borderRadius:14,border:"none",background:"rgba(255,255,255,0.18)",color:"#fff",fontSize:22,fontWeight:800,cursor:"pointer",textAlign:"center",letterSpacing:2}}>{m.name}</button>);
        })}
        <button onClick={function(){setPage("admin_pin");setPin("");setMsg(null);}}
          style={{width:"100%",padding:"14px",marginTop:20,borderRadius:10,border:"2px solid #A5D6A7",background:"transparent",color:"#A5D6A7",fontSize:14,fontWeight:600,cursor:"pointer"}}>{"\u{1F512}"} 管理者ログイン</button>
      </div>

        </div>
      </div>
      {msg?<div style={{padding:"10px 20px",background:"#1B5E20",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center"}}>{"\u2713"} {msg}</div>:null}

      {/* タブ */}
      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #eee"}}>
        {[["stamps","打刻・日誌"],["offdays","\u{1F4C5} 休み"],["shift","\u{1F4CB} シフト"]].map(function(t){
          var active=adminTab===t[0];
          return(<button key={t[0]} onClick={function(){setAdminTab(t[0]);}}
            style={{flex:1,padding:"12px",border:"none",background:active?"#E8F5E9":"#fff",fontWeight:active?700:400,fontSize:13,cursor:"pointer",
              color:active?"#2E7D32":"#999",borderBottom:active?"3px solid #2E7D32":"none"}}>{t[1]}</button>);
        })}
      </div>

      <div style={{padding:16}}>
        {/* 打刻・日誌タブ */}
        {adminTab==="stamps"?(<div>
          <h2 style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:12}}>今日の打刻・日誌 ({fmtDate(now)})</h2>
          {MEMBERS.map(function(m){
            var ms=byM[m.id]||[];var diary=diaryByM[m.id];
            return(<div key={m.id} style={{background:"#fff",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
              <div style={{background:"#2E7D32",padding:"10px 16px",color:"#fff",fontSize:16,fontWeight:700,display:"flex",justifyContent:"space-between"}}>
                <span>{m.name}</span><span style={{fontSize:12,opacity:0.8}}>{ms.length}件</span>
              </div>
              {ms.length===0?<div style={{padding:16,color:"#999",fontSize:14,textAlign:"center"}}>打刻なし</div>:
                <div>{ms.map(function(s,i){
                  return(<div key={i} style={{padding:"10px 16px",borderBottom:i<ms.length-1?"1px solid #eee":"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>{s.icon||""}</span><span style={{fontSize:14,fontWeight:600}}>{s.label}</span></div>
                    <div style={{fontSize:16,fontWeight:700,fontFamily:"'Courier New',monospace"}}>{s.timeStr}</div>
                  </div>);
                })}</div>}
              {diary?<div style={{padding:"10px 16px",background:"#F1F8E9",borderTop:"1px solid #C8E6C9"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#33691E",marginBottom:4}}>{"\u{1F4DD}"} 業務日誌</div>
                <div style={{display:"flex",gap:16,fontSize:14}}><span><strong>{diary.racks}</strong> ラック</span><span><strong>{diary.bundles}</strong> 束</span><span><strong>{diary.delivers}</strong> 搬入</span></div>
                {diary.memo?<div style={{fontSize:12,color:"#555",marginTop:4}}>{"\u{1F4AC}"} {diary.memo}</div>:null}
              </div>:null}
            </div>);
          })}
        </div>):null}

        {/* 休みタブ */}
        {adminTab==="offdays"?(<div>
          <h2 style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:12}}>{nxM.year}年{nxM.month}月の休み登録</h2>
          {WORKERS.map(function(m){
            var days=offByM[m.id]||[];
            return(<div key={m.id} style={{background:"#fff",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
              <div style={{background:"#E65100",padding:"10px 16px",color:"#fff",fontSize:16,fontWeight:700,display:"flex",justifyContent:"space-between"}}>
                <span>{m.name}</span><span style={{fontSize:12}}>休み{days.length}日</span>
              </div>
              <div style={{padding:"8px 12px"}}>
                {days.length===0?<div style={{padding:8,color:"#999",fontSize:14,textAlign:"center"}}>休み登録なし</div>:
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:4}}>
                    {days.slice().sort(function(a,b){return a-b;}).map(function(d){
                      var w=doW(nxM.year,nxM.month,d);
                      return(<span key={d} style={{background:"#FFCDD2",color:"#C62828",padding:"4px 10px",borderRadius:6,fontSize:14,fontWeight:700}}>
                        {nxM.month}/{d}({DJ[w]})</span>);
                    })}
                  </div>}
              </div>
            </div>);
          })}
        </div>):null}

        {/* シフトタブ */}
        {adminTab==="shift"?(<div>
          <h2 style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:12}}>{nxM.year}年{nxM.month}月のシフト</h2>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={doGenerateShift}
              style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1a237e,#283593)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              {"\u{1F504}"} シフト自動生成
            </button>
            {shiftData?<button onClick={saveShift}
              style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"#2E7D32",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              {"\u{1F4BE}"} 保存
            </button>:null}
          </div>
          {savedShift&&!shiftData?<div style={{background:"#E8F5E9",borderRadius:8,padding:8,marginBottom:10,fontSize:12,color:"#2E7D32",textAlign:"center"}}>
            {"\u2713"} 保存済みシフトを表示中
          </div>:null}
          {shiftData&&!savedShift?<div style={{background:"#FFF3E0",borderRadius:8,padding:8,marginBottom:10,fontSize:12,color:"#E65100",textAlign:"center"}}>
            ⚠ 未保存（セルクリックで編集可）
          </div>:null}

          {displayShift?(<div>
            {/* 工場シフト */}
            <div style={{background:"#fff",borderRadius:12,marginBottom:12,overflowX:"auto"}}>
              <div style={{padding:"12px 16px",fontWeight:700,fontSize:14,color:"#1a237e",borderBottom:"1px solid #eee"}}>工場勤務シフト</div>
              <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
                <thead><tr>
                  <th style={{padding:"6px 4px",background:"#1a237e",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>日</th>
                  <th style={{padding:"6px 4px",background:"#1a237e",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>曜</th>
                  {WORKERS.map(function(m){
                    return(<th key={m.id} style={{padding:"6px 4px",background:m.id==="hamabe"?"#7B1FA2":m.id==="kambara"?"#43A047":m.id==="yamamoto"?"#FB8C00":"#1E88E5",
                      color:"#fff",fontSize:10,border:"1px solid #ccc"}}>{m.name}</th>);
                  })}
                  <th style={{padding:"6px 4px",background:"#1a237e",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>人数</th>
                </tr></thead>
                <tbody>{displayShift.map(function(d,di){
                  return(<tr key={d.day}>
                    <td style={{padding:"4px",border:"1px solid #eee",textAlign:"center",fontSize:11}}>{d.day}</td>
                    <td style={{padding:"4px",border:"1px solid #eee",textAlign:"center",fontSize:11,fontWeight:600,
                      color:d.dow===0?"#e53935":d.dow===6?"#1565c0":"#333"}}>{DJ[d.dow]}</td>
                    {WORKERS.map(function(m){
                      var on=d.att.indexOf(m.id)>=0;
                      return(<td key={m.id} onClick={function(){if(shiftData)toggleShiftAtt(di,m.id);}}
                        style={{padding:"4px",border:"1px solid #eee",textAlign:"center",fontSize:11,
                          background:on?"#E8F5E9":"#fafafa",fontWeight:on?600:400,color:on?"#333":"#ccc",
                          cursor:shiftData?"pointer":"default"}}>{on?"○":"×"}</td>);
                    })}
                    <td style={{padding:"4px",border:"1px solid #eee",textAlign:"center",fontSize:11,fontWeight:700,
                      color:d.att.length<=1?"#e53935":"#333"}}>{d.att.length}</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>

            {/* 着火シフト */}
            <div style={{background:"#fff",borderRadius:12,marginBottom:12,overflowX:"auto"}}>
              <div style={{padding:"12px 16px",fontWeight:700,fontSize:14,color:"#1a237e",borderBottom:"1px solid #eee"}}>着火シフト</div>
              <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
                <thead><tr>
                  <th style={{padding:"6px",background:"#2E7D32",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>日</th>
                  <th style={{padding:"6px",background:"#2E7D32",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>曜</th>
                  <th style={{padding:"6px",background:"#1565c0",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>浜辺</th>
                  <th style={{padding:"6px",background:"#43A047",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>神原</th>
                  <th style={{padding:"6px",background:"#00ACC1",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>トミル</th>
                  <th style={{padding:"6px",background:"#FDD835",color:"#333",fontSize:10,border:"1px solid #ccc"}}>具志堅</th>
                  <th style={{padding:"6px",background:"#E65100",color:"#fff",fontSize:10,border:"1px solid #ccc"}}>半田</th>
                </tr></thead>
                <tbody>{displayShift.map(function(d){
                  var igMap={};
                  if(d.gi&&d.mi&&d.gi===d.mi)igMap[d.gi]="□元";
                  else{if(d.gi)igMap[d.gi]="□";if(d.mi)igMap[d.mi]="元";}
                  var cols=["hamabe","kambara","tomioka","gushiken","handa"];
                  var bgs=["#D6EAF8","#D5F5E3","#D1F2EB","#FEF9E7","#FDEBD0"];
                  return(<tr key={d.day}>
                    <td style={{padding:"4px 6px",border:"1px solid #ddd",background:"#E8F5E9",textAlign:"center",fontSize:11,fontWeight:600}}>
                      {nxM.month}/{d.day}</td>
                    <td style={{padding:"4px",border:"1px solid #ddd",background:"#E8F5E9",textAlign:"center",fontSize:11,fontWeight:700,
                      color:d.dow===0?"#e53935":d.dow===6?"#1565c0":"#333"}}>{DJ[d.dow]}</td>
                    {cols.map(function(id,ci){
                      var val=igMap[id]||"";
                      return(<td key={id} style={{padding:"4px",border:"1px solid #ddd",background:bgs[ci],textAlign:"center",fontSize:12,fontWeight:700}}>
                        {val}</td>);
                    })}
                  </tr>);
                })}</tbody>
              </table>
            </div>
          </div>):<div style={{background:"#fff",borderRadius:12,padding:32,textAlign:"center",color:"#999"}}>
            「シフト自動生成」ボタンを押してシフトを作成してください
          </div>}
        </div>):null}
      </div>

      <div style={{padding:"0 16px 40px",textAlign:"center"}}>
        <button onClick={function(){setPage("select");setPin("");}}
          style={{padding:"14px 40px",borderRadius:10,border:"2px solid #bbb",background:"#fff",color:"#666",fontSize:16,fontWeight:600,cursor:"pointer"}}>ログアウト</button>
      </div>
    </div>);
  }

  // === 日誌入力 ===
  if(showDiary){
    return(<div style={{minHeight:"100vh",background:"#ECEFF1",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,maxWidth:400,margin:"0 auto",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#333",marginBottom:4,textAlign:"center"}}>{"\u{1F4DD}"} 業務日誌</h2>
        <p style={{fontSize:13,color:"#888",textAlign:"center",marginBottom:24}}>今日の作業を記録してください</p>
        {[["ラック数",racks,setRacks],["束数",bundles,setBundles],["搬入回数",delivers,setDelivers]].map(function(item,idx){
          return(<div key={idx} style={{marginBottom:20}}>
            <label style={{display:"block",fontSize:14,fontWeight:700,color:"#333",marginBottom:6}}>{item[0]}</label>
            <input type="number" value={item[1]} onChange={function(e){item[2](e.target.value);}}
              style={{width:"100%",padding:"14px 16px",borderRadius:10,border:"2px solid #ddd",fontSize:20,fontWeight:700,textAlign:"center"}} min="0"/>
          </div>);
        })}
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:14,fontWeight:700,color:"#333",marginBottom:6}}>{"\u{1F4AC}"} メモ（任意）</label>
          <textarea value={memo} onChange={function(e){setMemo(e.target.value);}} placeholder="特記事項があれば入力"
            style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"2px solid #ddd",fontSize:14,minHeight:60,resize:"vertical"}}/>
        </div>
        <button onClick={doCheckoutWithDiary}
          style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:"#C62828",color:"#fff",fontSize:18,fontWeight:800,cursor:"pointer",marginBottom:10}}>
          {"\u{1F3E0}"} 退勤を確定する</button>
        <button onClick={doCheckoutSkip}
          style={{width:"100%",padding:"12px",borderRadius:10,border:"2px solid #ccc",background:"#fff",color:"#888",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          スキップして退勤</button>
      </div>
    </div>);
  }

  // === 休み登録 ===
  if(showOff){
    var nd2=dim(nxM.year,nxM.month);
    var firstDow=doW(nxM.year,nxM.month,1);
    var wd=user?user.workDays||[]:[];
    var weeks=[];var week=[];
    for(var i=0;i<firstDow;i++)week.push(null);
    for(var d=1;d<=nd2;d++){week.push(d);if(week.length===7){weeks.push(week);week=[];}}
    if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}
    return(<div style={{minHeight:"100vh",background:"#ECEFF1",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,padding:20,maxWidth:420,margin:"0 auto",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#333",textAlign:"center",marginBottom:4}}>{"\u{1F4C5}"} 休み登録</h2>
        <p style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:4}}>{user?user.name:""}さん</p>
        <p style={{fontSize:18,fontWeight:700,color:"#1B5E20",textAlign:"center",marginBottom:16}}>{nxM.year}年{nxM.month}月</p>
        <div style={{background:"#FFF3E0",borderRadius:8,padding:"8px 12px",marginBottom:16,fontSize:13,color:"#E65100",textAlign:"center"}}>休みたい日をタッチ（もう一度で解除）</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {DJ.map(function(dn,i){return(<div key={i} style={{textAlign:"center",fontSize:12,fontWeight:700,padding:"6px 0",color:i===0?"#e53935":i===6?"#1565c0":"#333"}}>{dn}</div>);})}
        </div>
        {weeks.map(function(wk,wi){
          return(<div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
            {wk.map(function(d,di){
              if(d===null)return <div key={di}></div>;
              var w=doW(nxM.year,nxM.month,d);
              var isWork=wd.indexOf(w)>=0;
              var isOff=offDays.indexOf(d)>=0;
              return(<button key={di} disabled={!isWork} onClick={function(){if(isWork)toggleOff(d);}}
                style={{padding:"10px 0",borderRadius:8,border:isOff?"2px solid #C62828":isWork?"2px solid #2E7D32":"1px solid #eee",
                  background:isOff?"#FFCDD2":isWork?"#E8F5E9":"#f5f5f5",fontSize:16,fontWeight:isWork?700:400,
                  color:isOff?"#C62828":isWork?"#333":"#ccc",cursor:isWork?"pointer":"default",textAlign:"center"}}>
                {d}{isOff?<div style={{fontSize:9,color:"#C62828",fontWeight:800}}>休み</div>:null}
              </button>);
            })}
          </div>);
        })}
        <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:12,fontSize:12,color:"#666"}}>
          <span><span style={{display:"inline-block",width:12,height:12,background:"#E8F5E9",border:"2px solid #2E7D32",borderRadius:3,marginRight:4,verticalAlign:"middle"}}></span>出勤日</span>
          <span><span style={{display:"inline-block",width:12,height:12,background:"#FFCDD2",border:"2px solid #C62828",borderRadius:3,marginRight:4,verticalAlign:"middle"}}></span>休み</span>
          <span><span style={{display:"inline-block",width:12,height:12,background:"#f5f5f5",border:"1px solid #eee",borderRadius:3,marginRight:4,verticalAlign:"middle"}}></span>元々休み</span>
        </div>
        {offDays.length>0?<div style={{marginTop:16,background:"#FFF8E1",borderRadius:8,padding:"10px 14px",fontSize:14}}>
          <strong style={{color:"#E65100"}}>登録済み:</strong> {offDays.slice().sort(function(a,b){return a-b;}).map(function(d){return nxM.month+"/"+d;}).join("、")}
        </div>:null}
        <button onClick={function(){setShowOff(false);}} style={{width:"100%",padding:"14px",marginTop:16,borderRadius:12,border:"none",background:"#1B5E20",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
          {"\u2190"} 戻る（自動保存済み）</button>
      </div>
    </div>);
  }

  // === メイン打刻画面 ===
  return(<div style={{minHeight:"100vh",background:"#ECEFF1"}}>
    <div style={{background:"linear-gradient(135deg,#1B5E20,#2E7D32)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:11,color:"#A5D6A7",letterSpacing:2}}>MAKIBA FACTORY</div>
        <div style={{fontSize:20,fontWeight:800,color:"#fff",letterSpacing:1}}>{user?user.name:""}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"'Courier New',monospace"}}>{fmtTime(now)}</div>
        <div style={{fontSize:12,color:"#C8E6C9"}}>{fmtDate(now)}</div>
      </div>
    </div>
    <div style={{padding:"6px 20px",background:gps?"#E8F5E9":"#FFF3E0",fontSize:12,color:gps?"#2E7D32":"#E65100"}}>
      {gps?"\u{1F4CD} GPS OK ("+gps.lat.toFixed(4)+", "+gps.lng.toFixed(4)+")":"\u{1F4CD} GPS 取得中..."}
    </div>
    {msg?<div style={{padding:"14px 20px",background:"#1B5E20",color:"#fff",fontSize:18,fontWeight:700,textAlign:"center",letterSpacing:1}}>{"\u2713"} {msg}</div>:null}
    {cnf?(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"32px 24px",maxWidth:360,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>{cnf.icon}</div>
        <div style={{fontSize:24,fontWeight:800,color:"#333",marginBottom:8}}>{cnf.label}</div>
        <div style={{fontSize:16,color:"#666",marginBottom:24}}>を記録しますか？</div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={function(){setCnf(null);}} style={{flex:1,padding:"16px",borderRadius:12,border:"2px solid #ccc",background:"#fff",color:"#666",fontSize:18,fontWeight:700,cursor:"pointer"}}>キャンセル</button>
          <button onClick={function(){doStamp(cnf);}} style={{flex:1,padding:"16px",borderRadius:12,border:"none",background:cnf.color,color:"#fff",fontSize:18,fontWeight:700,cursor:"pointer"}}>OK</button>
        </div>
      </div>
    </div>):null}
    <div style={{padding:"16px 16px 8px"}}>
      {ACTIONS.map(function(a){
        if(a.id==="checkout"){
          return(<button key={a.id} onClick={function(){setShowDiary(true);}}
            style={{width:"100%",padding:"22px 20px",marginBottom:10,borderRadius:16,border:"none",background:a.color,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:16,boxShadow:"0 3px 10px rgba(0,0,0,0.25)"}}>
            <span style={{fontSize:40,lineHeight:1,width:50,textAlign:"center"}}>{a.icon}</span>
            <span style={{fontSize:24,fontWeight:900,letterSpacing:2,flex:1,textAlign:"center"}}>{a.label}</span></button>);
        }
        return(<button key={a.id} onClick={function(){setCnf(a);}}
          style={{width:"100%",padding:"22px 20px",marginBottom:10,borderRadius:16,border:"none",background:a.color,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:16,boxShadow:"0 3px 10px rgba(0,0,0,0.25)"}}>
          <span style={{fontSize:40,lineHeight:1,width:50,textAlign:"center"}}>{a.icon}</span>
          <span style={{fontSize:24,fontWeight:900,letterSpacing:2,flex:1,textAlign:"center"}}>{a.label}</span></button>);
      })}
      <button onClick={function(){setShowOff(true);}}
        style={{width:"100%",padding:"18px 20px",marginBottom:10,marginTop:8,borderRadius:16,border:"2px dashed #E65100",background:"#FFF3E0",color:"#E65100",cursor:"pointer",display:"flex",alignItems:"center",gap:16}}>
        <span style={{fontSize:32,lineHeight:1,width:50,textAlign:"center"}}>{"\u{1F4C5}"}</span>
        <span style={{fontSize:20,fontWeight:800,letterSpacing:2,flex:1,textAlign:"center"}}>来月の休み登録</span></button>
    </div>
    <div style={{padding:"8px 16px 20px"}}>
      <h3 style={{fontSize:16,fontWeight:700,color:"#333",marginBottom:10}}>今日の記録 ({stamps.length}件)</h3>
      {stamps.length===0?<div style={{padding:24,textAlign:"center",color:"#999",fontSize:16,background:"#fff",borderRadius:12}}>まだ記録がありません</div>:
        <div style={{background:"#fff",borderRadius:12,overflow:"hidden"}}>
          {stamps.map(function(s,i){
            var act=null;for(var j=0;j<ACTIONS.length;j++){if(ACTIONS[j].id===s.action)act=ACTIONS[j];}
            return(<div key={i} style={{padding:"14px 16px",borderBottom:i<stamps.length-1?"1px solid #eee":"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:20}}>{act?act.icon:""}</span><span style={{fontSize:16,fontWeight:700}}>{s.label}</span></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:20,fontWeight:800,fontFamily:"'Courier New',monospace"}}>{s.timeStr}</div>
                {s.gpsLat?<div style={{fontSize:10,color:"#999"}}>{"\u{1F4CD}"}{s.gpsLat.toFixed(3)},{s.gpsLng.toFixed(3)}</div>:null}
              </div>
            </div>);
          })}
        </div>}
    </div>
    <div style={{padding:"0 16px 40px",textAlign:"center"}}>
      <button onClick={logout} style={{padding:"14px 40px",borderRadius:10,border:"2px solid #bbb",background:"#fff",color:"#666",fontSize:16,fontWeight:600,cursor:"pointer"}}>ログアウト</button>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
