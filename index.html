<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var DJ=["日","月","火","水","木","金","土"];
var MEMBERS=[
  {id:"hamabe",name:"浜辺",pin:"1111",workDays:[0,3,4,5,6],type:"salary",fork:true,combo:true,gDays:[],mDays:[]},
  {id:"kambara",name:"神原",pin:"2222",workDays:[0,1,2,6],type:"part",fork:true,combo:false,gDays:[6,0],mDays:[1,6,0]},
  {id:"yamamoto",name:"山本",pin:"3333",workDays:[1,2,4,5],type:"part",fork:true,combo:true,gDays:[],mDays:[]},
  {id:"tomioka",name:"富岡",pin:"4444",workDays:[1,3,5],type:"salary",fork:false,combo:false,gDays:[4,5],mDays:[5]},
  {id:"gushiken",name:"具志堅",pin:"5555",workDays:[],type:"ignite",fork:false,combo:false,gDays:[1,3],mDays:[]},
  {id:"handa",name:"半田",pin:"6666",workDays:[],type:"ignite",fork:false,combo:false,gDays:[],mDays:[2]}
];
var WORKERS=MEMBERS.filter(function(m){return m.type!=="ignite";});
var G_DAYS=[0,1,3,4,5,6];var M_DAYS=[0,1,2,5,6];
var ACTIONS=[
  {id:"checkin",label:"出 勤",icon:"\u{1F3ED}",color:"#2E7D32"},
  {id:"checkout",label:"退 勤",icon:"\u{1F3E0}",color:"#C62828"},
  {id:"ignite_golden",label:"着火（黄金泉）",icon:"\u{1F525}",color:"#E65100"},
  {id:"ignite_motoyu",label:"着火（元 湯）",icon:"\u{1F525}",color:"#4E342E"},
  {id:"inject",label:"投 入",icon:"\u{1FAB5}",color:"#1565C0"}
];
function pad(n){return n<10?"0"+n:""+n}
function fmtTime(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function fmtDate(d){return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate())}
function todayKey(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function dim(y,m){return new Date(y,m,0).getDate()}
function doW(y,m,d){return new Date(y,m-1,d).getDay()}
function mkKey(y,m){return y+"-"+pad(m)}
function nextMonth(){var d=new Date();var y=d.getFullYear();var m=d.getMonth()+2;if(m>12){m-=12;y++;}return{year:y,month:m}}
function curMonth(){var d=new Date();return{year:d.getFullYear(),month:d.getMonth()+1}}
function getNth(y,m,wd,n){var c=0;for(var d=1;d<=dim(y,m);d++){if(doW(y,m,d)===wd){c++;if(c===n)return d;}}return -1}
function findMember(id){for(var i=0;i<MEMBERS.length;i++){if(MEMBERS[i].id===id)return MEMBERS[i];}return{id:id,name:id,workDays:[],gDays:[],mDays:[]};}
function getIgniteDays(m){var all=[];(m.gDays||[]).forEach(function(d){if(all.indexOf(d)<0)all.push(d);});(m.mDays||[]).forEach(function(d){if(all.indexOf(d)<0)all.push(d);});return all;}

function generateShift(y,m,offByM,ignOffByM,season,lateByM){
  var nd=dim(y,m);var days=[];var s2=getNth(y,m,2,2);
  var injSlots=season==="winter"
    ?["9:00","11:30","14:30","17:00","19:30"]
    :["9:00","11:30","14:30","17:00"];
  var lbm=lateByM||{};
  // 1. 通常メンバーの出勤日を決定
  for(var d=1;d<=nd;d++){
    var w=doW(y,m,d);var att=[];var startTimes={};
    for(var i=0;i<WORKERS.length;i++){
      var mb=WORKERS[i];
      var sched=mb.workDays.indexOf(w)>=0;
      if(mb.id==="hamabe"&&!sched&&d===s2) sched=true;
      var off=offByM[mb.id]||[];
      if(sched&&off.indexOf(d)<0) att.push(mb.id);
    }
    // 神原の11時出勤をstartTimesに反映
    var kamLate=lbm["kambara"]||[];
    if(kamLate.indexOf(d)>=0&&att.indexOf("kambara")>=0){
      startTimes["kambara"]="11:00";
    }
    days.push({day:d,dow:w,att:att,forced:[],startTimes:startTimes});
  }
  // 2. 出勤者ゼロの日→社員(浜辺)優先、次に具志堅
  for(var d1b=0;d1b<days.length;d1b++){
    var dd1=days[d1b];
    if(dd1.att.length===0){
      // 浜辺が空いているか(社員優先)
      var hamOff=offByM["hamabe"]||[];
      if(hamOff.indexOf(dd1.day)<0){
        dd1.att.push("hamabe");
        dd1.forced.push("浜辺(出勤者ゼロ)");
      }else{
        // 具志堅が空いているか
        var gushiWorkOff=ignOffByM["gushiken"]||[];
        if(gushiWorkOff.indexOf(dd1.day)<0){
          dd1.att.push("gushiken");
          dd1.forced.push("具志堅(出勤者ゼロ)");
        }
      }
    }
  }
  // 3. フォーク制約
  for(var d2=0;d2<days.length;d2++){
    var dd=days[d2];var hF=false;
    for(var fi=0;fi<dd.att.length;fi++){
      var wm=findMember(dd.att[fi]);
      if(wm.fork) hF=true;
    }
    if(!hF){
      var fH=WORKERS.filter(function(m2){
        return m2.fork&&dd.att.indexOf(m2.id)<0;
      });
      if(fH.length>0){
        dd.att.push(fH[0].id);
        dd.forced.push(fH[0].name+"(フォーク)");
      }
    }
  }
  // 4. コンボ制約(週3)
  var ws=0;
  while(ws<days.length){
    var we=ws;
    for(var k=ws;k<days.length;k++){
      we=k;
      if(k>ws&&days[k].dow===1){we=k-1;break;}
      if(k===days.length-1) break;
    }
    var cD=0;
    for(var cd=ws;cd<=we;cd++){
      for(var ci=0;ci<days[cd].att.length;ci++){
        var cwm=findMember(days[cd].att[ci]);
        if(cwm.combo){cD++;break;}
      }
    }
    var need=3-cD;
    for(var ad=ws;ad<=we&&need>0;ad++){
      var aHC=false;
      for(var aci=0;aci<days[ad].att.length;aci++){
        var acwm=findMember(days[ad].att[aci]);
        if(acwm.combo) aHC=true;
      }
      if(!aHC){
        var cH=WORKERS.filter(function(m3){
          return m3.combo&&days[ad].att.indexOf(m3.id)<0;
        });
        if(cH.length>0){
          days[ad].att.push(cH[0].id);
          days[ad].forced.push(cH[0].name+"(準中型等)");
          need--;
        }
      }
    }
    ws=we+1;
  }
  // 5. 着火割り当て
  // □元をまとめる + 浜辺・神原・具志堅で均等分散
  // 富岡・半田は固定曜日パターン
  var ignCount={};
  MEMBERS.forEach(function(m2){ignCount[m2.id]=0;});
  var distIds=["hamabe","kambara","gushiken"];

  for(var d3=0;d3<days.length;d3++){
    var dd3=days[d3];var w3=dd3.dow;
    var nG=G_DAYS.indexOf(w3)>=0;
    var nM=M_DAYS.indexOf(w3)>=0;
    var gi=null,mi=null;

    // 空き判定
    var avMap={};
    MEMBERS.forEach(function(m3){
      if(m3.id==="hamabe"){
        // 浜辺は工場の休み=着火の休み
        var woff=offByM["hamabe"]||[];
        avMap[m3.id]=woff.indexOf(dd3.day)<0
          &&m3.workDays.indexOf(w3)>=0;
      }else{
        var ioff3=ignOffByM[m3.id]||[];
        avMap[m3.id]=ioff3.indexOf(dd3.day)<0;
      }
    });

    // 富岡・半田の固定曜日チェック
    var tomFM=findMember("tomioka");
    var hanFM=findMember("handa");
    var tomiG=nG&&tomFM.gDays.indexOf(w3)>=0
      &&avMap["tomioka"];
    var tomiM=nM&&tomFM.mDays.indexOf(w3)>=0
      &&avMap["tomioka"];
    var handaM=nM&&hanFM.mDays.indexOf(w3)>=0
      &&avMap["handa"];

    // 富岡・半田の固定割り当て
    if(tomiG) gi="tomioka";
    if(tomiM) mi="tomioka";
    if(handaM&&!mi) mi="handa";

    // 分散3人の空きを着火回数少ない順にソート
    var availD=distIds.filter(function(id2){
      return avMap[id2];
    });
    availD.sort(function(a2,b2){
      return ignCount[a2]-ignCount[b2];
    });

    if(nG&&nM){
      // 両方必要な日
      if(!gi&&!mi){
        // 両方空き→1人で□元
        if(availD.length>0){
          gi=availD[0];mi=availD[0];
        }
      }else if(gi&&!mi){
        // 黄金泉は決定(富岡)→元湯を分散
        if(availD.length>0){
          mi=availD[0];
        }
      }else if(!gi&&mi){
        // 元湯は決定→黄金泉を分散
        // miが分散メンバーなら□元にまとめる
        if(distIds.indexOf(mi)>=0){
          gi=mi;
        }else if(availD.length>0){
          gi=availD[0];
        }
      }else{
        // 両方決定済み(富岡□元等)→何もしない
      }
      // giとmiが別の分散メンバーの場合
      // →1人で□元にまとめてもう1人の負担を減らす
      if(gi&&mi&&gi!==mi
        &&distIds.indexOf(gi)>=0
        &&distIds.indexOf(mi)>=0){
        // 少ない方に□元をまとめる
        var fewer=ignCount[gi]<=ignCount[mi]
          ?gi:mi;
        gi=fewer;mi=fewer;
      }
    }else if(nG&&!nM){
      if(!gi){
        if(availD.length>0) gi=availD[0];
      }
    }else if(!nG&&nM){
      if(!mi){
        if(availD.length>0) mi=availD[0];
      }
    }

    // フォールバック: 出勤者から
    if(nG&&!gi&&dd3.att.length>0){
      gi=dd3.att[0];
    }
    if(nM&&!mi&&dd3.att.length>0){
      var fb2=dd3.att.filter(function(x2){
        return x2!==gi;
      });
      mi=fb2.length>0?fb2[0]:dd3.att[0];
    }

    // カウント更新
    if(gi) ignCount[gi]++;
    if(mi&&mi!==gi) ignCount[mi]++;
    // 投入割り当て
    var isTue=w3===2;
    var isSecondTue=(d3+1)===s2&&isTue;
    var isWed=w3===3;
    var salary=dd3.att.filter(function(id){
      var m4=findMember(id);
      return m4.type==="salary";
    });
    var part=dd3.att.filter(function(id){
      var m4=findMember(id);
      return m4.type==="part";
    });
    var injArr=[];
    var note="";
    var secondTueCrew=[];
    if(isTue){
      // 火曜日は全て投入なし
      for(var si=0;si<injSlots.length;si++){
        injArr.push(null);
      }
      if(isSecondTue){
        // 第2火曜→ボイラー掃除、2名選出(社員優先)
        note="ボイラー掃除";
        var pool=salary.concat(part);
        for(var pi=0;pi<Math.min(2,pool.length);pi++){
          secondTueCrew.push(pool[pi]);
        }
      }
    }else{
      // 通常日
      for(var si3=0;si3<injSlots.length;si3++){
        if(si3===2&&!isTue&&!isWed){
          // 14:30(3回目)→火水以外は必ず社員
          if(salary.length>0){
            injArr.push(salary[0]);
          }else{
            // 社員がいない日→アルバイトで埋める
            if(part.length>0){
              injArr.push(part[0]);
            }else{injArr.push(null);}
          }
        }else{
          // その他のスロット→社員優先
          if(salary.length>0){
            injArr.push(
              salary[si3%salary.length]
            );
          }else if(part.length>0){
            injArr.push(
              part[si3%part.length]
            );
          }else{injArr.push(null);}
        }
      }
    }
    // 残業チェック(17:00投入がアルバイト)
    var hasOT=false;
    var i17=injSlots.indexOf("17:00");
    if(i17>=0&&injArr[i17]){
      var w17m=findMember(injArr[i17]);
      if(w17m.type==="part") hasOT=true;
    }
    dd3.injSlots=injSlots;
    var lbl="";
    if(gi&&mi) lbl="□元";
    else if(gi) lbl="□";
    else if(mi) lbl="元";
    dd3.gi=gi;dd3.mi=mi;dd3.lbl=lbl;
    dd3.nG=nG;dd3.nM=nM;
    dd3.injArr=injArr;dd3.hasOT=hasOT;
    dd3.note=note;dd3.secondTueCrew=secondTueCrew;
  }
  return days;
}

function App(){
  var _p=useState("select"),page=_p[0],setPage=_p[1];
  var _u=useState(null),user=_u[0],setUser=_u[1];
  var _st=useState([]),stamps=_st[0],setStamps=_st[1];
  var _msg=useState(null),msg=_msg[0],setMsg=_msg[1];
  var _gps=useState(null),gps=_gps[0],setGps=_gps[1];
  var _now=useState(new Date()),now=_now[0],setNow=_now[1];
  var _pin=useState(""),pin=_pin[0],setPin=_pin[1];
  var _su=useState(null),selUser=_su[0],setSelUser=_su[1];
  var _conf=useState(null),cnf=_conf[0],setCnf=_conf[1];
  var _all=useState([]),allSt=_all[0],setAllSt=_all[1];
  var _allD=useState([]),allDiary=_allD[0],setAllDiary=_allD[1];
  var _showDiary=useState(false),showDiary=_showDiary[0],setShowDiary=_showDiary[1];
  var _racks=useState("0"),racks=_racks[0],setRacks=_racks[1];
  var _bundles=useState("0"),bundles=_bundles[0],setBundles=_bundles[1];
  var _delivers=useState("0"),delivers=_delivers[0],setDelivers=_delivers[1];
  var _memo=useState(""),memo=_memo[0],setMemo=_memo[1];
  var _showOff=useState(false),showOff=_showOff[0],setShowOff=_showOff[1];
  var _offDays=useState([]),offDays=_offDays[0],setOffDays=_offDays[1];
  var _lateDays=useState([]),lateDays=_lateDays[0],setLateDays=_lateDays[1];
  var _ignOffDays=useState([]),ignOffDays=_ignOffDays[0],setIgnOffDays=_ignOffDays[1];
  var _allOff=useState([]),allOff=_allOff[0],setAllOff=_allOff[1];
  var _allIgnOff=useState([]),allIgnOff=_allIgnOff[0],setAllIgnOff=_allIgnOff[1];
  var _tab=useState("stamps"),adminTab=_tab[0],setAdminTab=_tab[1];
  var _shift=useState(null),shiftData=_shift[0],setShiftData=_shift[1];
  var _savedShift=useState(null),savedShift=_savedShift[0],setSavedShift=_savedShift[1];
  var _season=useState("summer"),season=_season[0],setSeason=_season[1];
  var _monthSt=useState([]),monthSt=_monthSt[0],setMonthSt=_monthSt[1];
  var _shiftTarget=useState("next"),shiftTarget=_shiftTarget[0],setShiftTarget=_shiftTarget[1];

  useEffect(function(){var t=setInterval(function(){setNow(new Date());},1000);return function(){clearInterval(t);};},[]);
  var nxM=shiftTarget==="cur"?curMonth():nextMonth();
  var mk=mkKey(nxM.year,nxM.month);

  // === ドキュメントID方式で直接読み書き ===
  // 各ユーザーのoffdays/igniteoffはドキュメントID = "userId_monthKey"
  function loadMyOff(uid){
    // 工場休み
    db.collection("offdays").doc(uid+"_"+mk).get()
      .then(function(doc){
        if(doc.exists&&doc.data().days){
          setOffDays(doc.data().days);
        }else{setOffDays([]);}
        if(doc.exists&&doc.data().lateDays){
          setLateDays(doc.data().lateDays);
        }else{setLateDays([]);}
      }).catch(function(){setOffDays([]);setLateDays([]);});
    // 着火休み
    db.collection("igniteoff").doc(uid+"_"+mk).get()
      .then(function(doc){
        if(doc.exists&&doc.data().days){
          setIgnOffDays(doc.data().days);
        }else{setIgnOffDays([]);}
      }).catch(function(){setIgnOffDays([]);});
  }

  function loadMyStamps(uid){
    db.collection("stamps")
      .where("userId","==",uid)
      .where("dateKey","==",todayKey())
      .orderBy("time","desc")
      .onSnapshot(function(snap){
        var a=[];
        snap.forEach(function(doc){a.push(doc.data());});
        setStamps(a);
      });
  }

  // 管理者: 全員分を個別ドキュメントIDで取得
  function loadAllOff(){
    var offResults=[];var ignResults=[];
    var done=0;var total=MEMBERS.length*2;
    function check(){
      done++;
      if(done>=total){
        setAllOff(offResults);
        setAllIgnOff(ignResults);
      }
    }
    MEMBERS.forEach(function(m){
      db.collection("offdays").doc(m.id+"_"+mk).get()
        .then(function(doc){
          if(doc.exists){offResults.push(doc.data());}
          check();
        }).catch(function(){check();});
      db.collection("igniteoff").doc(m.id+"_"+mk).get()
        .then(function(doc){
          if(doc.exists){ignResults.push(doc.data());}
          check();
        }).catch(function(){check();});
    });
  }

  function loadAll(){
    db.collection("stamps")
      .where("dateKey","==",todayKey())
      .orderBy("time","desc")
      .onSnapshot(function(snap){
        var a=[];
        snap.forEach(function(doc){a.push(doc.data());});
        setAllSt(a);
      });
    db.collection("diary")
      .where("dateKey","==",todayKey())
      .onSnapshot(function(snap){
        var a=[];
        snap.forEach(function(doc){a.push(doc.data());});
        setAllDiary(a);
      });
    // 今月の着火データ(月間集計用)
    var thisY=new Date().getFullYear();
    var thisM=new Date().getMonth()+1;
    var mStart=thisY+"-"+pad(thisM)+"-01";
    var mEnd=thisY+"-"+pad(thisM)+"-31";
    db.collection("stamps")
      .where("dateKey",">=",mStart)
      .where("dateKey","<=",mEnd)
      .get()
      .then(function(snap){
        var a=[];
        snap.forEach(function(doc){a.push(doc.data());});
        setMonthSt(a);
      });
    loadAllOff();
    db.collection("shifts").doc(mk).get()
      .then(function(doc){
        if(doc.exists){setSavedShift(doc.data().days);setShiftData(doc.data().days);}
      });
  }

  function getGps(){if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){setGps({lat:p.coords.latitude,lng:p.coords.longitude});},function(){setGps(null);});}

  function login(m){
    setOffDays([]);setIgnOffDays([]);
    setUser(m);
    loadMyStamps(m.id);
    loadMyOff(m.id);
    setPage("main");setMsg(null);getGps();
  }
  function logout(){
    setUser(null);setStamps([]);
    setOffDays([]);setIgnOffDays([]);
    setPage("select");setPin("");
    setSelUser(null);setCnf(null);
    setShowDiary(false);setShowOff(false);
  }
  function doStamp(a){
    var t=new Date();
    db.collection("stamps").add({userId:user.id,userName:user.name,action:a.id,label:a.label,icon:a.icon,time:t.getTime(),timeStr:fmtTime(t),dateStr:fmtDate(t),dateKey:todayKey(),gpsLat:gps?gps.lat:null,gpsLng:gps?gps.lng:null});
    setMsg(a.label+" を記録しました");setCnf(null);setTimeout(function(){setMsg(null);},3000);getGps();
  }
  function doCheckoutWithDiary(){
    var t=new Date();

  function toggleOff(day){

    if(user&&user.id==="kambara"){
      var isLate=lateDays.indexOf(day)>=0;
      var isOff=offDays.indexOf(day)>=0;
      var newLate=lateDays.slice();
      var newOff=offDays.slice();
      if(!isLate&&!isOff){
        // 通常 → 11時出勤
        newLate.push(day);
      }else if(isLate&&!isOff){
        // 11時出勤 → 休み
        newLate=newLate.filter(function(d){return d!==day;});
        newOff.push(day);
      }else{
        // 休み → 通常
        newOff=newOff.filter(function(d){return d!==day;});
      }
      setLateDays(newLate);setOffDays(newOff);
      db.collection("offdays").doc(user.id+"_"+mk).set({userId:user.id,userName:user.name,monthKey:mk,days:newOff,lateDays:newLate,updated:new Date().getTime()});
      return;

    var nd2;if(offDays.indexOf(day)>=0)nd2=offDays.filter(function(d){return d!==day;});else nd2=offDays.concat([day]);
